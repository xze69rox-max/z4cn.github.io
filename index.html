<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابات Ayato</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 15px; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        h1 { font-size: 1.5rem; margin-bottom: 25px; letter-spacing: 1px; }
        .links-container { width: 100%; max-width: 400px; }
        .link-card { display: block; background: var(--card); color: var(--text); text-decoration: none; padding: 16px; margin-bottom: 12px; border-radius: 12px; text-align: center; font-weight: 600; transition: all 0.3s ease; border: 1px solid #334155; }
        .link-card:hover { transform: translateY(-3px); background: #334155; border-color: var(--accent); color: var(--accent); }
        .footer { margin-top: 30px; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="profile-img">👤</div>
    <h1>@xxAyato</h1>

    <div class="links-container">
        <a href="https://t.me/xxAyato" class="link-card" target="_blank">تليجرام</a>
        <a href="https://instagram.com/z4cn" class="link-card" target="_blank">انستغرام</a>
        <a href="https://tiktok.com/@ketp" class="link-card" target="_blank">تيك توك (الشخصي)</a>
        <a href="https://tiktok.com/@vq51" class="link-card" target="_blank">متجري على تيك توك</a>
    </div>

    <div class="footer">تم التصميم بواسطة Gemini</div>

</body>
</html>
